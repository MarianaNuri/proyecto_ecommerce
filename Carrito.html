<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/styles.css">

    <title>Carrito de compra</title>
</head>

<body>

<!-- HEADER -->
<header class="p-3 bg-white shadow-sm fixed-top">
  <div class="container">
    <div class="d-flex flex-wrap align-items-center justify-content-between">

      <!-- Logo -->
      <a href="index.html" class="d-flex align-items-center text-decoration-none">
        <img src="imagenes/logo.png" alt="Logo VerdeVida" width="40" height="40">
        <span class="fs-4 fw-semibold text-success ms-2">VerdeVida</span>
      </a>

      <!-- MENÚ -->
      <nav>
        <ul class="nav">
          <li><a href="index.html" class="nav-link text-dark">Inicio</a></li>
          <li><a href="quienes.html" class="nav-link text-dark">Quiénes somos</a></li>
          <li><a href="catalogo.html" class="nav-link text-dark">Catálogo</a></li>
          <li>
            <a class="nav-link text-success fw-bold" href="carrito.html">
              <i class="bi bi-cart"></i>
            </a>
          </li>
        </ul>
      </nav>

    </div>
  </div>
</header>


<!-- CONTENIDO -->
<main class="container mt-5 pt-5">

    <h2 class="text-success mb-4">🛒 Carrito de compra</h2>

    <div class="card shadow-sm p-4">

        <table id="tabla-carrito" class="table align-middle">
            <thead class="table-success">
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th style="width:150px;">Cantidad</th>
                    <th>Subtotal</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>🌿 Planta decorativa</td>
                    <td class="precio">150</td>
                    <td>
                        <input type="number"
                               class="cantidad form-control"
                               value="1"
                               min="1">
                    </td>
                    <td>$<span class="subtotal">150</span></td>
                </tr>

                <tr>
                    <td>🪴 Maceta ecológica</td>
                    <td class="precio">90</td>
                    <td>
                        <input type="number"
                               class="cantidad form-control"
                               value="1"
                               min="1">
                    </td>
                    <td>$<span class="subtotal">90</span></td>
                </tr>
            </tbody>
        </table>

        <!-- TOTAL -->
        <div class="text-end">
            <h4 class="fw-bold text-success">
                Total: $<span id="total">240</span>
            </h4>
        </div>

    </div>

</main>


<!-- SCRIPT -->
<script src="assets/script.js"></script>

</body>
</html>
