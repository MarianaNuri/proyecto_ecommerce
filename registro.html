<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/styles.css">

    <title>Registro</title>
</head>
<body>
<!-- HEADER -->
<header class="p-3 bg-white shadow-sm fixed-top">
  <div class="container">
    <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-between">

      <!-- Logo -->
      <a href="index.html" class="d-flex align-items-center mb-2 mb-lg-0 text-decoration-none">
         <img src="imagenes/logo.png" alt="Logo VerdeVida" width="40" height="40"> <!--este es opcional, se puede quedar solo con el nombre de la tienda-->
         <span class="fs-4 fw-semibold text-success"> VerdeVida</span> 
       
      </a>
      <!-- Menu UL LI -->
      <nav>
        <ul class="nav col-12 col-lg-auto mb-2 justify-content-center mb-md-0">
          <li><a href="index.html" class="nav-link px-3 text-dark">Inicio</a></li>
          <li><a href="quienes.html" class="nav-link px-3 text-dark">Quiénes somos</a></li>
          <li><a href="catalogo.html" class="nav-link px-3 text-dark">Catálogo</a></li>
          <li class="nav-item"> <a class="nav-link text-dark" href="carrito.html"> <i class="bi bi-cart "></i> </a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>

<main>
  <section class="container my-5 pt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow p-4">
          <h2 class="text-center text-success mb-4">Registro</h2>

          <form id="registroForm">
            <div class="mb-3">
              <input type="text" class="form-control" id="nombre" placeholder="Nombre completo" required minlength="3" maxlength="50">
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" id="email" placeholder="Correo electronico" required>
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" id="contraseña" placeholder="Contraseña" required minlength="6" maxlength="20">
            </div>
            <div class="mb-3">
              <input type="date" class="form-control" id="fecha" required>
            </div>
            <div class="mb-3">
              <input type="tel" class="form-control" id="telefono" placeholder="Numero celular (10 digitos)" required pattern="[0-9]{10}">
            </div>
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="terminos">
              <label class="form-check-label">
                Acepto los terminos y condiciones
              </label>
            </div>
            <button type="submit" class="btn btn-success w-100" id="btnEnviar" disabled>
              Registrarse
            </button>
            <p class="text danger mt-3 text-center" id="mensajeError"></p>
          </form>
        </div>

      </div>
    </div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/script.js"></script>
</body>
</html>
