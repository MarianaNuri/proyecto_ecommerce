<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/styles.css">

    <title>Catálogo</title>
</head>

<body>

<!-- HEADER -->
<header class="p-3 bg-white shadow-sm fixed-top">
  <div class="container">
    <div class="d-flex flex-wrap align-items-center justify-content-between">

      <a href="index.html" class="d-flex align-items-center text-decoration-none">
        <img src="imagenes/logo.png" width="40" height="40">
        <span class="fs-4 fw-semibold text-success ms-2">VerdeVida</span>
      </a>

      <nav>
        <ul class="nav">
          <li><a href="index.html" class="nav-link text-dark">Inicio</a></li>
          <li><a href="quienes.html" class="nav-link text-dark">Quiénes somos</a></li>
          <li><a href="catalogo.html" class="nav-link text-success fw-bold">Catálogo</a></li>
          <li>
            <a class="nav-link text-dark" href="carrito.html">
              <i class="bi bi-cart"></i>
            </a>
          </li>
        </ul>
      </nav>

    </div>
  </div>
</header>


<!-- CONTENIDO -->
<main class="container mt-5 pt-5">

<h2 class="text-success mb-4 text-center">🌿 Nuestro Catálogo</h2>

<div class="row g-4">

    <!-- PRODUCTO 1 -->
    <div class="col-md-4">
        <div class="card h-100 shadow-sm">
            <img src="imagenes/planta1.jpg" class="card-img-top" alt="Planta">
            <div class="card-body text-center">
                <h5 class="card-title">Planta Decorativa</h5>
                <p class="text-success fw-bold">$150 MXN</p>
                <button class="btn btn-success agregar-carrito">
                    Agregar al carrito
                </button>
            </div>
        </div>
    </div>

    <!-- PRODUCTO 2 -->
    <div class="col-md-4">
        <div class="card h-100 shadow-sm">
            <img src="imagenes/maceta.jpg" class="card-img-top" alt="Maceta">
            <div class="card-body text-center">
                <h5 class="card-title">Maceta Ecológica</h5>
                <p class="text-success fw-bold">$90 MXN</p>
                <button class="btn btn-success agregar-carrito">
                    Agregar al carrito
                </button>
            </div>
        </div>
    </div>

    <!-- PRODUCTO 3 -->
    <div class="col-md-4">
        <div class="card h-100 shadow-sm">
            <img src="imagenes/kit.jpg" class="card-img-top" alt="Kit jardinería">
            <div class="card-body text-center">
                <h5 class="card-title">Kit de Jardinería</h5>
                <p class="text-success fw-bold">$220 MXN</p>
                <button class="btn btn-success agregar-carrito">
                    Agregar al carrito
                </button>
            </div>
        </div>
    </div>

</div>

<!-- MENSAJE -->
<div id="mensajeCarrito" class="alert alert-success mt-4 text-center d-none">
    Producto agregado al carrito ✅
</div>

</main>

<script src="assets/script.js"></script>

</body>
</html>
